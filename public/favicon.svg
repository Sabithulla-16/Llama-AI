<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Vibrant gradient background matching the colorful logo (pink → purple → blue) -->
    <linearGradient id="bg" x1="10" y1="8" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF1B8D"/>
      <stop offset="0.5" stop-color="#7F2FD8"/>
      <stop offset="1" stop-color="#1D7FED"/>
    </linearGradient>
    <linearGradient id="glow" x1="16" y1="12" x2="40" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background with vibrant gradient -->
  <rect x="3" y="3" width="58" height="58" rx="18" fill="url(#bg)"/>
  
  <!-- Glow effect -->
  <circle cx="20" cy="18" r="14" fill="url(#glow)"/>
  
  <!-- Stylized Llama head (inspired by your logo design) -->
  <!-- Main head ellipse -->
  <ellipse cx="32" cy="34" rx="14" ry="16" fill="#FFFFFF" opacity="0.95"/>
  
  <!-- Left ear -->
  <path d="M 22 16 Q 20 10 18 8 Q 18 15 22 18 Z" fill="#FFFFFF" opacity="0.95"/>
  
  <!-- Right ear -->
  <path d="M 42 16 Q 44 10 46 8 Q 46 15 42 18 Z" fill="#FFFFFF" opacity="0.95"/>
  
  <!-- Snout/face detail -->
  <ellipse cx="32" cy="38" rx="7" ry="5" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Nose -->
  <circle cx="32" cy="37" r="1.5" fill="#FF1B8D" opacity="0.9"/>
  
  <!-- Eyes -->
  <circle cx="27" cy="30" r="2" fill="#7F2FD8" opacity="0.95"/>
  <circle cx="37" cy="30" r="2" fill="#7F2FD8" opacity="0.95"/>
  
  <!-- Light accents for tech AI feel -->
  <circle cx="23" cy="48" r="1" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="32" cy="50" r="1" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="41" cy="48" r="1" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Connection lines (circuit-like detail) -->
  <line x1="23" y1="48" x2="32" y2="50" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>
  <line x1="32" y1="50" x2="41" y2="48" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>
</svg>